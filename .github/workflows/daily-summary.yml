name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Restore published summaries
        run: |
          mkdir -p docs/_posts docs/api
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git checkout origin/gh-pages -- _posts api/manifest.json || true
            if [ -d _posts ]; then
              cp -R _posts/. docs/_posts/
            fi
            if [ -f api/manifest.json ]; then
              cp api/manifest.json docs/api/manifest.json
            fi
          fi

      - name: Restore existing mobile feed manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HORIZON_MOBILE_FEED_TAG: mobile-feed
        run: |
          mkdir -p data/mobile_feed
          if gh release view "$HORIZON_MOBILE_FEED_TAG" >/dev/null 2>&1; then
            gh release download "$HORIZON_MOBILE_FEED_TAG" \
              --pattern manifest.json \
              --dir data/mobile_feed || true
            if [ -f data/mobile_feed/manifest.json ]; then
              mv data/mobile_feed/manifest.json data/mobile_feed/existing-manifest.json
            fi
          fi

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your config.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          HORIZON_PUBLIC_BASE_URL: ${{ vars.HORIZON_PUBLIC_BASE_URL }}
          HORIZON_MOBILE_FEED_REPOSITORY: ${{ github.repository }}
          HORIZON_MOBILE_FEED_TAG: mobile-feed
          HORIZON_GENERATE_PLACEHOLDER_SUMMARY: "1"
        run: uv run horizon --hours 48

      - name: Publish mobile feed assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HORIZON_MOBILE_FEED_TAG: mobile-feed
        run: |
          if ! gh release view "$HORIZON_MOBILE_FEED_TAG" >/dev/null 2>&1; then
            gh release create "$HORIZON_MOBILE_FEED_TAG" \
              --title "Horizon Mobile Feed" \
              --notes "Static assets for the Horizon mobile app."
          fi

          today="$(date -u +%Y-%m-%d)"
          assets=("data/mobile_feed/manifest.json")
          for path in "docs/_posts/${today}-summary-zh.md" "docs/_posts/${today}-summary-en.md"; do
            if [ -f "$path" ]; then
              assets+=("$path")
            fi
          done

          gh release upload "$HORIZON_MOBILE_FEED_TAG" "${assets[@]}" --clobber

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: $(date +'%Y-%m-%d')"
          publish_branch: gh-pages
          enable_jekyll: true
