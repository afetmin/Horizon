name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at 00:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit changes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Restore published summaries
        run: |
          mkdir -p docs/_posts docs/api
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git checkout origin/gh-pages -- _posts api/manifest.json api/mobile-manifest.json || true
            if [ -d _posts ]; then
              cp -R _posts/. docs/_posts/
            fi
            if [ -f api/manifest.json ]; then
              cp api/manifest.json docs/api/manifest.json
            fi
            if [ -f api/mobile-manifest.json ]; then
              cp api/mobile-manifest.json docs/api/mobile-manifest.json
            fi
          fi

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json
          # Modify these based on your config.json provider settings
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
          HORIZON_PUBLIC_BASE_URL: ${{ vars.HORIZON_PUBLIC_BASE_URL }}
          HORIZON_MOBILE_FEED_REPOSITORY: ${{ github.repository }}
          HORIZON_MOBILE_FEED_REF: gh-pages
          HORIZON_GENERATE_PLACEHOLDER_SUMMARY: "1"
        run: uv run horizon --hours 48

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: $(date +'%Y-%m-%d')"
          publish_branch: gh-pages
          enable_jekyll: true
